{% extends 'base.html' %}
{% block title %}Login — NFC IET Portal{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">N</div>
      <h1>NFC IET Portal</h1>
      <p>Sign in to your academic account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" style="display:flex;flex-direction:column;gap:1.25rem">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@nfc.edu" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn-primary full-width">Sign In →</button>
    </form>

    <div class="login-footer">
      <p><strong>Demo Accounts</strong></p>
      <code>2022cs001@nfc.edu</code> — Student<br>
      <code>ali.ahmed@nfc.edu</code> — Teacher<br>
      <code>admin@nfc.edu</code> — Admin
    </div>
  </div>
</div>
{% endblock %}
